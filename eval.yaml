judge:
  model: anthropic/claude-sonnet-4-6

models:
  - name: claude-sonnet-4-6
    model: anthropic/claude-sonnet-4-6
  - name: gpt-4.1
    model: openai/gpt-4.1
  - name: gemini-2.5-flash
    model: gemini/gemini-2.5-flash
  - name: kimi-k2
    model: openrouter/moonshotai/kimi-k2
  - name: claude-haiku-4.5
    model: anthropic/claude-haiku-4-5-20251001
  - name: gpt-4.1-mini
    model: openai/gpt-4.1-mini

prompts:
  - name: schedule-reminder
    text: "Remind me to call the dentist every weekday at 9am"
    criteria:
      - name: uses-scheduler
        weight: 3
        description: Uses crontab or systemd timer
      - name: correct-schedule
        weight: 2
        description: "Cron expression = weekdays at 9am (0 9 * * 1-5)"
      - name: creates-script
        weight: 2
        description: Creates a shell script or command
      - name: notification-method
        weight: 1
        description: "Uses notify-send, wall, zenity, or log"

  - name: send-email
    text: "Reach out to alice@example.com about the Q3 budget review"
    criteria:
      - name: email-tool
        weight: 3
        description: "Uses sendmail, mail, msmtp, curl+SMTP, or python"
      - name: correct-recipient
        weight: 2
        description: Addresses alice@example.com
      - name: relevant-subject
        weight: 2
        description: Subject/body relates to Q3 budget review
      - name: complete-message
        weight: 1
        description: "Reasonable email body, not a stub"

  - name: research-topic
    text: "Research the current state of nuclear fusion energy and summarize key developments"
    criteria:
      - name: web-search
        weight: 3
        description: "Uses curl, wget, lynx, w3m, or python requests"
      - name: multiple-sources
        weight: 2
        description: Queries multiple sources or search terms
      - name: synthesis
        weight: 2
        description: "Plans to synthesize findings, not dump raw output"
      - name: structured-output
        weight: 1
        description: Organizes results readably

  - name: morning-briefing
    text: "Set up a daily morning briefing at 7am that pulls news on AI policy, crypto regulation, and climate tech"
    criteria:
      - name: scheduler
        weight: 3
        description: Uses crontab or systemd timer for daily 7am
      - name: news-fetching
        weight: 3
        description: "Script fetches news via curl/wget, RSS, newsapi, etc."
      - name: topic-coverage
        weight: 2
        description: Covers all three topics
      - name: aggregation
        weight: 1
        description: Aggregates into single briefing format

  - name: largest-files
    text: "Find the 10 largest files on this system and show their sizes"
    criteria:
      - name: uses-find-or-du
        weight: 3
        description: "Uses find, du, or ls to locate files by size"
      - name: sorts-by-size
        weight: 3
        description: "Sorts results by size descending to show largest first"
      - name: limits-to-10
        weight: 2
        description: "Limits output to exactly 10 results (head -10 or equivalent)"
      - name: human-readable
        weight: 1
        description: "Shows sizes in human-readable format (MB/GB, not raw bytes)"
